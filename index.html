<!DOCTYPE html>
<html lang="br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles.css" />

  <script src="index.js"></script>

  <title>Gerenciador de Tarefas</title>
</head>

<body>

  <head>
    <h1>Gerenciador de tarefas</h1>
  </head>
  <main>
    <form id="form" onsubmit="salvarTarefa(event)">
      <input type="text" id="tarefa" name="tarefa" placeholder="Digite uma tarefa" required />
      <input type="text" id="etiqueta" name="etiqueta" placeholder="Digite uma etiqueta" required />

      <button id="btadicionar" class="botoes" type="submit">+</button>
    </form>

    <div id="hs">
      <h2 id="h2_tarefas">Lista de tarefas</h2>
      <h2 id="h2_etiquetas">Etiquetas</h2>
    </div>

    <div id="div-lista">
      <ul id="lista"></ul>
      <ul id="etiquetas"></ul>
    </div>


    <div id="hs_riscado">
      <h2 id="h2_tarefas_riscado">Tarefas concluídas</h2>
      <h2 id="h2_etiquetas_riscado">Etiquetas</h2>
    </div>
    <div id="lista-imagens">
      <ul id="lista-riscada"></ul>
      <ul id="imagens"></ul>
    </div>


  </main>
  <footer>
    <label id="contador">Tarefas: </label>
  </footer>
</body>

</html>
